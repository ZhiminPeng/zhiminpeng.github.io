<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Writing | Zhimin Peng</title>
  <meta name="description" content="Writing by Zhimin Peng on search, recommendation, and applied AI." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700&display=swap" rel="stylesheet" />
  <!-- Prevent flash of wrong theme -->
  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <style>
    :root {
      --bg: #fff;
      --text: #333;
      --subtext: #555;
      --muted: #999;
      --border: #eee;
      --border-list: #f0f0f0;
      --code-bg: #f5f5f5;
      --code-text: #555;
      --link: #007bff;
    }

    html.dark {
      --bg: #1c1c1e;
      --text: #e5e5e7;
      --subtext: #aeaeb2;
      --muted: #636366;
      --border: #38383a;
      --border-list: #2c2c2e;
      --code-bg: #2c2c2e;
      --code-text: #aeaeb2;
      --link: #5eb0ff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { overflow-y: scroll; }
    body {
      font-family: Raleway, Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--text); font-size: 16px;
      line-height: 1.75; -webkit-font-smoothing: antialiased;
      transition: background 0.2s, color 0.2s;
    }
    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .container { max-width: 740px; margin: 0 auto; padding: 0 24px; }
    nav { border-bottom: 1px solid var(--border); margin-bottom: 48px; }
    nav .container { display: flex; align-items: center; justify-content: space-between; height: 52px; }
    .nav-brand { font-weight: 700; font-size: 0.95rem; color: var(--text); text-decoration: none; }
    .nav-brand:hover { text-decoration: none; color: var(--text); }
    nav ul { list-style: none; display: flex; align-items: center; gap: 24px; }
    nav ul a { font-size: 0.9rem; font-weight: 600; color: var(--subtext); text-decoration: none; }
    nav ul a:hover { color: var(--link); text-decoration: none; }
    nav ul a.active { color: var(--text); }

    #theme-toggle {
      background: none; border: none; cursor: pointer;
      font-size: 1rem; color: var(--subtext);
      padding: 2px 4px; line-height: 1;
      display: flex; align-items: center;
    }
    #theme-toggle:hover { color: var(--link); }
    .dark-icon { display: none; }
    html.dark .light-icon { display: none; }
    html.dark .dark-icon { display: inline; }

    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; }
    .page-sub { color: var(--muted); font-size: 0.95rem; margin-bottom: 36px; }
    .post-list { list-style: none; }
    .post-list li { padding: 7px 0; font-size: 0.975rem; border-bottom: 1px solid var(--border-list); }
    .post-list li:first-child { border-top: 1px solid var(--border-list); }
    .post-list code {
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.8rem; background: var(--code-bg);
      padding: 2px 5px; border-radius: 3px; color: var(--code-text); margin-right: 4px;
    }
    .post-list a { color: var(--text); font-weight: 600; }
    .post-list a:hover { color: var(--link); text-decoration: none; }
    footer {
      border-top: 1px solid var(--border); padding: 24px 0 40px;
      font-size: 0.85rem; color: var(--muted); margin-top: 48px;
      display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;
    }
    footer a { color: var(--muted); }
    footer a:hover { color: var(--link); text-decoration: none; }
  </style>
</head>
<body>

  <nav>
    <div class="container">
      <a href="/" class="nav-brand">zhiminpeng</a>
      <ul>
        <li><a href="/papers.html">Research</a></li>
        <li><a href="/writing/" class="active">Writing</a></li>
        <li><a href="https://scholar.google.com/citations?user=vRvQj2IAAAAJ&hl=en" target="_blank" rel="noopener">Scholar</a></li>
        <li>
          <button id="theme-toggle" aria-label="Toggle dark mode">
            <span class="light-icon">☾</span>
            <span class="dark-icon">☀</span>
          </button>
        </li>
      </ul>
    </div>
  </nav>

  <div class="container">
    <h1>Writing</h1>
    <p class="page-sub">Notes on search, recommendation, and applied AI.</p>

    <ul class="post-list">
      <!-- ADD NEW POSTS ABOVE THIS LINE -->
    </ul>

    <footer>
      <span>© 2026 Zhimin Peng</span>
      <span>
        <a href="mailto:zhiminp@gmail.com">Email</a> &nbsp;·&nbsp;
        <a href="https://www.linkedin.com/in/zhimin-peng-20005033/" target="_blank" rel="noopener">LinkedIn</a> &nbsp;·&nbsp;
        <a href="https://latentvaluelab.com" target="_blank" rel="noopener">Latent Value Lab</a>
      </span>
    </footer>
  </div>

  <script>
    document.getElementById('theme-toggle').addEventListener('click', function() {
      var html = document.documentElement;
      html.classList.toggle('dark');
      localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
    });
  </script>

</body>
</html>
